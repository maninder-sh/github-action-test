name: Terraform Test
on: 
  workflow_dispatch: 
permissions:
  id-token: write
  contents: read
jobs:
  job1:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      # 1. Login to Azure for Init/Plan
      - name: Azure login
        uses: azure/login@v2
        with:
          

      - name: Terraform Install 
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Initialize
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform validate
          terraform plan
  job2:
      name: Terraform Apply
      runs-on: ubuntu-latest
      needs: job1
      steps:
        # 2. Login to Azure for Apply
        - name: Azure login
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
              
        - name: Checkout Repo Code
          uses: actions/checkout@v4

        - name: Terraform setup
          uses: hashicorp/setup-terraform@v3

        - name: Terraform apply
          run: |
            terraform init
            terraform apply -auto-approve
