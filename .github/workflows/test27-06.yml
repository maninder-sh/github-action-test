name: test-gha

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  azure_login:
    name: azure login job
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout codebase
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login using the stored GitHub secret
      - name: login via stored secret
        uses: azure/login@v2
        with:
          creds: |
            ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Verify the login by showing account details
      - name: Verify Azure CLI access
        run: |
          az account show
